# Two-step Science GRPO smoke test for two 48 GiB GPUs.

runtime:
  python_bin: python3
  verl_module: verl.trainer.main_ppo
  wandb_mode: disabled
  env_file: .env.local
  used_model: no_api

data:
  train_files:
    - data/M2RL/science/train.parquet
  val_files:
    - eval/domains/science/data/gpqa.parquet
  train_batch_size: 4
  val_batch_size: 32
  max_prompt_length: 2048
  max_response_length: 512
  filter_overlong_prompts: true
  truncation: error
  shuffle: true
  validation_shuffle: false
  seed: 42
  return_raw_chat: true
  enable_thinking: false

model:
  student_path: Qwen/Qwen3-4B
  student_base_path: Qwen/Qwen3-4B
  primary_teacher_path: Qwen/Qwen3-4B
  secondary_teacher_path: null
  teacher_model_device: cpu
  attn_implementation: flash_attention_2
  use_remove_padding: false

actor:
  learning_rate: "5e-7"
  lr_warmup_steps_ratio: 0.0
  only_reverse_kl_advantages: false
  lambda_vals: 1.0
  multi_teacher_distill: false
  ppo_mini_batch_size: 4
  ppo_micro_batch_size_per_gpu: 1
  use_dynamic_bsz: true
  use_kl_loss: true
  kl_loss_coef: 0.0001
  kl_loss_type: low_var_kl
  entropy_coeff: 0.001
  ppo_max_token_len_per_gpu: 4096
  gradient_checkpointing: true
  param_offload: false
  optimizer_offload: false
  model_dtype: fp32

rollout:
  calculate_log_probs: true
  log_prob_micro_batch_size_per_gpu: 1
  tensor_model_parallel_size: 1
  name: vllm
  mode: sync
  gpu_memory_utilization: 0.5
  enforce_eager: true
  enable_chunked_prefill: false
  n: 4
  max_model_len: 2560
  max_num_batched_tokens: 4096
  max_num_seqs: 8
  temperature: 1.0
  top_p: 1.0
  val_n: 1
  val_do_sample: false
  val_temperature: 0.0
  val_top_p: 1.0
  seed: 42

rollout_correction:
  rollout_is: token
  rollout_is_threshold: 2.0
  rollout_rs: null
  bypass_mode: false

trainer:
  project_name: grpo-teachers
  experiment_name: qwen4b-m2rl-science-2gpu-smoke
  logger: '["console"]'
  n_gpus_per_node: 2
  nnodes: 1
  save_freq: -1
  default_local_dir: checkpoints/qwen4b-m2rl-science-2gpu-smoke
  test_freq: 1
  total_epochs: 1
  total_training_steps: 2
  max_actor_ckpt_to_keep: 1
  max_critic_ckpt_to_keep: 1
  critic_warmup: 0
  val_before_train: false
  log_val_generations: 8

extra_overrides:
  - data.dataloader_num_workers=0
  - custom_reward_function.path=grpo/rewards/m2rl.py
  - custom_reward_function.name=compute_score
  - algorithm.kl_ctrl.kl_coef=0.001
  - actor_rollout_ref.actor.clip_ratio=0.2
  - actor_rollout_ref.actor.clip_ratio_c=10
