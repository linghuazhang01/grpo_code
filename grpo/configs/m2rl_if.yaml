# M2RL-style instruction-following GRPO for Qwen 4B non-thinking behavior.

runtime:
  python_bin: python3
  verl_module: verl.trainer.main_ppo
  wandb_mode: online
  used_model: no_api

data:
  train_files:
    - data/M2RL/if/train.parquet
  val_files:
    - eval/domains/ifbench/data/IFBench_test.parquet
  train_batch_size: 2048
  val_batch_size: 512
  max_prompt_length: 2048
  max_response_length: 32768
  filter_overlong_prompts: true
  truncation: error
  shuffle: true
  validation_shuffle: false
  seed: 42
  return_raw_chat: true
  enable_thinking: false

model:
  student_path: Qwen/Qwen3-4B
  student_base_path: Qwen/Qwen3-4B
  primary_teacher_path: Qwen/Qwen3-4B
  secondary_teacher_path: null
  teacher_model_device: cpu

actor:
  learning_rate: "5e-7"
  lr_warmup_steps_ratio: 0.0
  only_reverse_kl_advantages: false
  lambda_vals: 1.0
  multi_teacher_distill: false
  ppo_mini_batch_size: 256
  ppo_micro_batch_size_per_gpu: 1
  use_dynamic_bsz: true
  use_kl_loss: true
  kl_loss_coef: 0.0001
  kl_loss_type: low_var_kl
  entropy_coeff: 0.001
  ppo_max_token_len_per_gpu: 34816
  gradient_checkpointing: true
  param_offload: true
  optimizer_offload: true

rollout:
  calculate_log_probs: true
  log_prob_micro_batch_size_per_gpu: 1
  tensor_model_parallel_size: 2
  name: vllm
  mode: sync
  gpu_memory_utilization: 0.7
  enforce_eager: false
  enable_chunked_prefill: true
  n: 16
  max_model_len: 34816
  max_num_batched_tokens: 34816
  max_num_seqs: 128
  temperature: 1.0
  top_p: 1.0
  val_n: 1
  val_do_sample: false
  val_temperature: 0.0
  val_top_p: 1.0
  seed: 42

rollout_correction:
  rollout_is: token
  rollout_is_threshold: 5.0
  rollout_rs: null
  bypass_mode: false

trainer:
  project_name: grpo-teachers
  experiment_name: qwen4b-non-thinking-m2rl-if-grpo
  logger: '["console","wandb"]'
  n_gpus_per_node: 8
  nnodes: 1
  save_freq: 20
  default_local_dir: checkpoints/qwen4b-non-thinking-m2rl-if-grpo
  test_freq: 5
  total_epochs: 1
  total_training_steps: null
  critic_warmup: 0
  val_before_train: true
  log_val_generations: 10

extra_overrides:
  - custom_reward_function.path=grpo/rewards/m2rl.py
  - custom_reward_function.name=compute_score
  - algorithm.kl_ctrl.kl_coef=0.001
  - actor_rollout_ref.actor.clip_ratio=0.2
  - actor_rollout_ref.actor.clip_ratio_c=10

