# Two-step M2RL IFBench GRPO smoke test for the RL training code path.

runtime:
  python_bin: python3
  verl_module: verl.trainer.main_ppo
  wandb_mode: disabled
  used_model: no_api

data:
  train_files:
    - data/M2RL/if/train.parquet
  val_files:
    - data/M2RL/if/train.parquet
  train_batch_size: 2
  val_batch_size: 2
  max_prompt_length: 1024
  max_response_length: 512
  filter_overlong_prompts: true
  truncation: error
  shuffle: true
  validation_shuffle: false
  seed: 42
  return_raw_chat: true
  enable_thinking: false

model:
  student_path: Qwen/Qwen3-4B
  student_base_path: Qwen/Qwen3-4B
  primary_teacher_path: Qwen/Qwen3-4B
  secondary_teacher_path: null
  teacher_model_device: cpu

actor:
  learning_rate: "5e-7"
  lr_warmup_steps_ratio: 0.0
  only_reverse_kl_advantages: false
  lambda_vals: 1.0
  multi_teacher_distill: false
  ppo_mini_batch_size: 2
  ppo_micro_batch_size_per_gpu: 1
  use_dynamic_bsz: true
  use_kl_loss: true
  kl_loss_coef: 0.0001
  kl_loss_type: low_var_kl
  entropy_coeff: 0.001
  ppo_max_token_len_per_gpu: 4096
  gradient_checkpointing: true
  param_offload: true
  optimizer_offload: true

rollout:
  calculate_log_probs: true
  log_prob_micro_batch_size_per_gpu: 1
  tensor_model_parallel_size: 1
  name: vllm
  mode: sync
  gpu_memory_utilization: 0.55
  enforce_eager: false
  enable_chunked_prefill: true
  n: 2
  max_model_len: 1536
  max_num_batched_tokens: 4096
  max_num_seqs: 16
  temperature: 1.0
  top_p: 1.0
  val_n: 1
  val_do_sample: false
  val_temperature: 0.0
  val_top_p: 1.0
  seed: 42

rollout_correction:
  rollout_is: token
  rollout_is_threshold: 5.0
  rollout_rs: null
  bypass_mode: false

trainer:
  project_name: grpo-teachers
  experiment_name: qwen4b-non-thinking-m2rl-if-smoke
  logger: '["console"]'
  n_gpus_per_node: 1
  nnodes: 1
  save_freq: 0
  default_local_dir: checkpoints/qwen4b-non-thinking-m2rl-if-smoke
  test_freq: 0
  total_epochs: 2
  total_training_steps: 2
  critic_warmup: 0
  val_before_train: false
  log_val_generations: 0

extra_overrides:
  - data.dataloader_num_workers=0
  - actor_rollout_ref.model.use_remove_padding=False
  - custom_reward_function.path=grpo/rewards/m2rl.py
  - custom_reward_function.name=compute_score
  - algorithm.kl_ctrl.kl_coef=0.001
  - actor_rollout_ref.actor.clip_ratio=0.2
  - actor_rollout_ref.actor.clip_ratio_c=10
